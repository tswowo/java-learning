<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tlias智能学习辅助系统</title>
    <style>
        body {
            margin: 0;
        }

        /* 顶栏样式 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #c2c0c0;
            padding: 20px 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        /* 加大加粗标题 */
        .header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: bold;
        }

        /* 文本链接样式 */
        .header a {
            text-decoration: none;
            color: #333;
            font-size: 16px;
        }

        /* 搜索表单区域 */
        .search-form {
            display: flex;
            align-items: center;
            padding: 20px;
            background-color: #f9f9f9;
        }

        /* 表单控件样式 */
        .search-form input[type="text"],
        .search-form select {
            margin-right: 10px;
            padding: 10px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 26%;
        }

        /* 按钮样式 */
        .search-form button {
            padding: 10px 15px;
            margin-left: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        /* 清空按钮样式 */
        .search-form button.clear {
            background-color: #6c757d;
        }

        .table {
            min-width: 100%;
            border-collapse: collapse;
        }

        /* 设置表格单元格边框 */
        .table td,
        .table th {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }

        .avatar {
            width: 30px;
            height: 30px;
            object-fit: cover;
            border-radius: 50%;
        }

        /* 页脚版权区域 */
        .footer {
            background-color: #c2c0c0;
            color: white;
            text-align: center;
            padding: 10px 0;
            margin-top: 30px;
        }

        .footer .company-name {
            font-size: 1.1em;
            font-weight: bold;
        }

        .footer .copyright {
            font-size: 0.9em;
        }

        #container {
            width: 80%;
            margin: 0 auto;
        }
    </style>
</head>

<body>

    <div id="container">
        <!-- 顶栏 -->
        <div class="header">
            <h1>Tlias智能学习辅助系统</h1>
            <a href="#">退出登录</a>
        </div>

        <!-- 搜索表单区域 -->
        <form class="search-form" action="#" method="post">
            <input type="text" placeholder="姓名" v-model="searchEmp.name" />

            <select v-model="searchEmp.gender">
                <option value="">性别</option>
                <option value="1">男</option>
                <option value="2">女</option>
            </select>

            <select v-model="searchEmp.job">
                <option value="">职位</option>
                <option value="1">班主任</option>
                <option value="2">讲师</option>
                <option value="3">学工主管</option>
                <option value="4">教研主管</option>
                <option value="5">咨询师</option>
            </select>

            <button type="button" @click="getEmployeeList">查询</button>
            <button type="button" @click="clearList">清空</button>
        </form>

        <table class="table table-striped table-bordered">
            <thead>
                <tr>
                    <th>序号</th>
                    <th>姓名</th>
                    <th>性别</th>
                    <th>头像</th>
                    <th>职位</th>
                    <th>入职日期</th>
                    <th>最后操作时间</th>
                    <th>操作</th>
                </tr>
            </thead>

            <tbody>
                <tr v-for="(emp, index) in empList" :key="emp.id">
                    <td>{{ index + 1 }}</td>
                    <td>{{ emp.name }}</td>
                    <td>
                        <span v-if="emp.gender === 1">男</span>
                        <span v-else-if="emp.gender === 2">女</span>
                    </td>
                    <td><img :src="emp.image" alt="头像" class="avatar"></td>
                    <td>{{ emp.job }}</td>
                    <td>{{ emp.entrydate }}</td>
                    <td>{{ parseTimeDate(emp.updatetime) }}</td>
                    </td>
                    <td class="btn-group">
                        <button class="edit">编辑</button>
                        <button class="delete">删除</button>
                    </td>
                </tr>
            </tbody>
        </table>

    </div>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script>

        Vue.createApp({
            data() {
                return {
                    searchEmp: {
                        name: '',
                        gender: '',
                        job: ''
                    },
                    empList: []
                }
            },
            methods: {
                getEmployeeList() {
                    let url = 'https://web-server.itheima.net/emps/list?';
                    for (let key in this.searchEmp) {
                        if (this.searchEmp[key] != '') {
                            url += key + '=' + this.searchEmp[key] + '&';
                        }
                    }
                    axios.get('https://web-server.itheima.net/emps/list', {
                        params: this.searchEmp
                    }).then(result => {
                        this.empList = result.data.data
                    }).finally(() => {
                        console.log('请求结束:', this.empList);
                    })
                },
                clearList() {
                    this.empList = [];
                    this.searchEmp = {
                        name: '',
                        gender: '',
                        job: ''
                    }
                },
                parseTimeDate(time) {
                    time = time.split('T');
                    return time.join(' ');
                }
            }
        }).mount('#container')
    </script>
</body>

</html>
